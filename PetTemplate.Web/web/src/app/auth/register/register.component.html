<div class="col-md-offset-3 col-md-6">
  <form class="form-horizontal" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <h4>Creating a new user.</h4>
    <hr>
    <div class="row mb-3">
      <label class="col-md-4 col-form-label" for="username">Username *:</label>
      <div class="col-md-8">
        <input class="form-control" type="text" formControlName="username" />
        <form-validation [model]="registerForm.controls['username']" fieldName="username"></form-validation>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-md-4 col-form-label" for="password">Password *:</label>
      <div class="col-md-8">
        <input class="form-control" type="password" formControlName="password" />
        <form-validation [model]="registerForm.controls['password']" fieldName="password"></form-validation>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-md-4 col-form-label" for="passwordConfirm">Confirm password *:</label>
      <div class="col-md-8">
        <input class="form-control" type="password" formControlName="passwordConfirm" />
        @if (!registerForm.controls['passwordConfirm'].pristine && registerForm.hasError('PassNotSame')) {
          <div class="error-msg">
            <div class="text-danger">Password and password confirmation must match!</div>
          </div>
        }
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-md-4 col-form-label" for="phone">Phone:</label>
      <div class="col-md-8">
        <input class="form-control" type="text" formControlName="phone" />
        <form-validation [model]="registerForm.controls['phone']" fieldName="phone"></form-validation>
      </div>
    </div>
    <div class="row mb-3">
      <label class="col-md-4 col-form-label" for="email">Email:</label>
      <div class="col-md-8">
        <input class="form-control" type="text" formControlName="email" />
        <form-validation [model]="registerForm.controls['email']" fieldName="email"></form-validation>
      </div>
    </div>

    <div class="row mb-3">
      <div class="mx-auto col-md-1">
        <input type="submit" value="Register" class="btn btn-primary">
      </div>
    </div>
  </form>
</div>
